name: CI/CD - Test, Build, Push, Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: ./app
        run: npm install

      - name: Run tests
        working-directory: ./app
        run: npm test

  build-and-push:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./dockerfile
          push: true
          tags: |
            banzo12/devflow:latest
            banzo12/devflow:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            echo "Pulling latest image..."
            docker pull banzo12/devflow:latest

            echo "Stopping and removing old container if it exists..."
            docker stop devflow-app 2>/dev/null || true
            docker rm devflow-app 2>/dev/null || true

            echo "Starting new container..."
            docker run -d \
              --name devflow-app \
              --restart unless-stopped \
              -p 3000:3000 \
              banzo12/devflow:latest

            echo "Waiting for container to be ready..."
            sleep 3

            echo "Verifying container is running..."
            docker ps --filter name=devflow-app

            echo "Smoke test against the running container..."
            curl --fail --silent http://localhost:3000 | head -c 200
            echo ""
            echo "Deploy complete."
